[book]
title = "计算神经科学与机器学习"
authors = ["Neuromatch Academy"]
language = "zh"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
theme = "theme"

[preprocessor.katex]
command = "mdbook-katex-fork"

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.playground]
editable = true
line-numbers = true
