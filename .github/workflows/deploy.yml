name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install mdbook and preprocessors
        run: |
          which mdbook || cargo install mdbook
          which mdbook-mermaid || cargo install mdbook-mermaid

      - name: Build zh
        run: cd zh && mdbook build

      - name: Build en
        run: cd en && mdbook build

      - name: Combine output
        run: |
          mkdir -p dist
          cp -r zh/book dist/zh
          cp -r en/book dist/en
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=zh/"><title>Redirecting...</title></head>
          <body><p>Redirecting to <a href="zh/">中文版</a> | <a href="en/">English</a></p></body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
